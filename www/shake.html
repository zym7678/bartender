<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎲 摇一杯 - 调酒库</title>
<link rel="stylesheet" href="style.css">
<link rel=manifest href=manifest.json><meta name=theme-color content=#d4a574><meta name=apple-mobile-web-app-capable content=yes><meta name=apple-mobile-web-app-status-bar-style content=default><link rel=apple-touch-icon href=icons/icon-180.png sizes=180x180><link rel=apple-touch-icon href=icons/icon-192.png sizes=192x192></head>
<body>
<header>
<div class="header-inner">
<div><h1>🍸 <span>调酒库</span></h1><p>个人调酒管理工具</p></div>
<nav>
<a href="index.html">🏠</a>
<a href="cabinet.html">🍾 酒柜</a>
<a href="recipes.html">📖 配方</a>
<a href="shake.html" class="active">🎲 摇一杯</a>
<a href="make.html">🔍 做一杯</a>
<a href="log.html">📋 记录</a>
</nav>
</div>
</header>
<main>
<div class="page-title">🎲 摇一杯</div>
<div class="card">
<div class="card-header"><h2>今天喝什么？</h2><button class="btn btn-outline btn-sm" onclick="randomDrink()">🔄 重新摇</button></div>
<div id="shake-result"><div class="empty-state"><div class="empty-icon">🎲</div><p>点击下面按钮摇一杯</p><button class="btn btn-primary" style="margin-top:12px" onclick="randomDrink()">🎲 摇一杯！</button></div></div>
</div>
</main>

<div class="modal-overlay" id="modal-brand">
<div class="modal">
<h3>🥂 选择品牌</h3>
<div class="modal-sub" id="brand-recipe-name">为这杯酒选择品牌</div>
<div id="brand-pick-list"></div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal('brand')">取消</button><button class="btn btn-primary" onclick="confirmBrandPick()">确认制作</button></div>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="common.js"></script>
<script>
function formatRecipeText(text) {
  return esc(text || "暂无").replace(/\n/g, "<br>");
}

function randomDrink() {
  const recipes = DB.get("recipes");
  const element = document.getElementById("shake-result");
  if (!recipes.length) {
    element.innerHTML = "<div class=empty-state><div class=empty-icon>🍸</div><p>还没有配方</p><button class='btn btn-primary' style=margin-top:12px onclick=location.href='recipes.html'>去添加配方</button></div>";
    return;
  }
  showDrink(recipes[Math.floor(Math.random() * recipes.length)]);
}

function showDrink(recipe) {
  const missing = checkMissing(recipe);
  const element = document.getElementById("shake-result");
  const quote = String.fromCharCode(34);
  let html = "<div class=random-result><div style=font-size:3rem;margin-bottom:8px>🎲</div><div class=random-name>" + esc(recipe.name) + "</div>";
  if (recipe.glass) html += "<div class=random-glass>🍸 " + esc(recipe.glass) + "</div>";
  html += "<div class=random-ingredients><h4>🥃 配料</h4><ul>" +
    recipe.ingredients.map((ingredient) =>
      "<li>" + esc(ingredient.name) + " — " + ingredient.amount + " " + (ingredient.unit || "ml") +
      (missing.find((item) => item.name === ingredient.name) ? " <span class=missing-badge>缺</span>" : "") +
      "</li>"
    ).join("") +
    "</ul></div><div class=random-instructions><h4>👨‍🍳 做法</h4><p>" + formatRecipeText(recipe.instructions) + "</p></div>";
  if (recipe.garnish) html += "<div class=random-instructions><h4>🌿 装饰</h4><p>" + formatRecipeText(recipe.garnish) + "</p></div>";
  if (missing.length) html += "<div style=background:#fff5f5;border:1px solid #f5c6cb;border-radius:8px;padding:12px;margin:16px 0;text-align:center;font-size:.85rem;color:var(--warn)>⚠️ 缺少 " + missing.map((item) => esc(item.name)).join("、") + "<br><span style=font-size:.78rem>材料不足，换一杯吧</span></div>";
  html += "<div class=random-actions><button class='btn btn-outline' onclick=randomDrink()>🔄 换一杯</button>";
  if (!missing.length) html += "<button class='btn btn-primary' onclick=makeDrink(" + quote + recipe.id + quote + ")>🥂 干了这杯！</button>";
  html += "</div></div>";
  element.innerHTML = html;
}

highlightNav();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js")}</script></body>
</html>
