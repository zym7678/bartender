<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔍 做一杯 - 调酒库</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a574">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
<header>
<div class="header-inner">
<div><h1>🍸 <span>调酒库</span></h1><p>个人调酒管理工具</p></div>
<nav>
<a href="index.html">🏠</a>
<a href="cabinet.html">🍾 酒柜</a>
<a href="recipes.html">📖 配方</a>
<a href="shake.html">🎲 摇一杯</a>
<a href="make.html" class="active">🔍 做一杯</a>
<a href="log.html">📋 记录</a>
</nav>
</div>
</header>
<main>
<div class="page-title">🔍 做一杯</div>
<div class="card">
<div class="search-tabs" id="search-tabs">
<button class="active" data-mode="name">按酒名搜索</button>
<button data-mode="spirit">按基酒搜索</button>
</div>
<div class="form-row" style="margin-bottom:16px">
<input type="text" id="search-input" placeholder="输入关键词...">
<button class="btn btn-primary" onclick="doSearch()">搜索</button>
</div>
<div id="search-results"><div class="empty-state"><div class="empty-icon">🔍</div><p>搜索配方，一键制作</p></div></div>
</div>
</main>

<div class="modal-overlay" id="modal-brand">
<div class="modal">
<h3>🥂 选择品牌</h3>
<div class="modal-sub" id="brand-recipe-name">为这杯酒选择品牌</div>
<div id="brand-pick-list"></div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal('brand')">取消</button><button class="btn btn-primary" onclick="confirmBrandPick()">确认制作</button></div>
</div>
</div>

<div class="modal-overlay" id="modal-recipe-detail">
<div class="modal">
<h3 id="detail-name">🍸 配方详情</h3>
<div id="detail-content"></div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal('recipe-detail')">关闭</button><button class="btn btn-primary" id="detail-make-btn" style="display:none">做这杯</button></div>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="common.js"></script>
<script>
function formatRecipeText(text) {
  return esc(text || "暂无").replace(/\n/g, "<br>");
}

let searchMode = "name";
document.querySelectorAll("#search-tabs button").forEach((button) => {
  button.addEventListener("click", () => {
    document.querySelectorAll("#search-tabs button").forEach((entry) => entry.classList.remove("active"));
    button.classList.add("active");
    searchMode = button.dataset.mode;
    document.getElementById("search-input").placeholder = searchMode === "name" ? "输入鸡尾酒名称..." : "输入基酒名称...";
  });
});

document.getElementById("search-input").addEventListener("keydown", (event) => {
  if (event.key === "Enter") doSearch();
});

function doSearch() {
  const query = document.getElementById("search-input").value.trim().toLowerCase();
  const element = document.getElementById("search-results");
  const all = DB.get("recipes");
  if (!query) {
    element.innerHTML = "<div class=empty-state><div class=empty-icon>🔍</div><p>输入关键词搜索</p></div>";
    return;
  }

  const results = searchMode === "name"
    ? all.filter((recipe) => recipe.name.toLowerCase().includes(query))
    : all.filter((recipe) => recipe.ingredients.some((ingredient) => ingredient.name.toLowerCase().includes(query)));

  if (!results.length) {
    element.innerHTML = "<div class=empty-state><div class=empty-icon>🔍</div><p>没有找到匹配的配方</p></div>";
    return;
  }

  const quote = String.fromCharCode(34);
  element.innerHTML = "<p style=font-size:.82rem;color:var(--text2);margin-bottom:12px>找到 " + results.length + " 个</p>" +
    results.map((recipe) => {
      const missing = checkMissing(recipe);
      return "<div class=recipe-preview><div class=recipe-preview-header><span class=recipe-preview-name>🍸 " + esc(recipe.name) +
        "</span></div><div class=recipe-preview-meta>" + recipe.ingredients.map((ingredient) => esc(ingredient.name)).join(" · ") +
        "</div><div class=recipe-preview-tags style=margin-top:4px>" +
        (missing.length ? "<span style=color:var(--warn);font-size:.78rem>⚠️ 缺 " + missing.map((item) => esc(item.name)).join("、") + "</span>" : "<span style=color:var(--ok);font-size:.78rem>✅ 材料齐全</span>") +
        "</div><div class=search-actions><button class='btn btn-outline btn-sm' onclick=showRecipeDetail(" + quote + recipe.id + quote + ")>查看配方</button>" +
        (missing.length ? "" : "<button class='btn btn-primary btn-sm' onclick=makeDrink(" + quote + recipe.id + quote + ")>做这杯</button>") +
        "</div></div>";
    }).join("");
}

function showRecipeDetail(id) {
  const recipe = DB.get("recipes").find((item) => item.id === id);
  if (!recipe) return;
  const missing = checkMissing(recipe);
  const button = document.getElementById("detail-make-btn");
  document.getElementById("detail-name").textContent = "🍸 " + recipe.name;

  let html = "<div style=margin-bottom:16px>";
  if (recipe.glass) html += "<div style=font-size:.82rem;color:var(--text2);margin-bottom:4px>🍸 杯型: " + esc(recipe.glass) + "</div>";
  html += "<div class=random-ingredients style=margin:12px 0><h4>🥃 配料</h4><ul>" +
    recipe.ingredients.map((ingredient) => "<li>" + esc(ingredient.name) + " — " + ingredient.amount + " " + (ingredient.unit || "ml") + "</li>").join("") +
    "</ul></div><div class=random-instructions style=margin:12px 0><h4>👨‍🍳 做法</h4><p>" + formatRecipeText(recipe.instructions) + "</p></div>";
  if (recipe.garnish) html += "<div style=font-size:.85rem;margin-top:12px><span style=font-size:.85rem;color:var(--text2);font-weight:500>🌿 装饰</span><p style=margin-top:4px>" + formatRecipeText(recipe.garnish) + "</p></div>";
  html += "</div>";

  document.getElementById("detail-content").innerHTML = html;
  if (missing.length) {
    button.style.display = "none";
  } else {
    button.style.display = "inline-flex";
    button.onclick = function () {
      closeModal("recipe-detail");
      makeDrink(id);
    };
  }
  showModal("recipe-detail");
}

highlightNav();
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js")}</script>
</body>
</html>
